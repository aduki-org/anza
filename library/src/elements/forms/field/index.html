<label part="label">
  <slot name="label"></slot>
  <span class="required-marker" aria-hidden="true">*</span>
</label>
<div class="hint-box" part="hint">
  <slot name="hint"></slot>
</div>
<div class="control-box" part="control">
  <slot></slot>
</div>
<div class="error-box" part="error">
  <slot name="error"></slot>
</div>
